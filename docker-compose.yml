services:
  postgres:
    image: postgres:16
    container_name: avloniy_muzeyi_db
    environment:
      POSTGRES_DB: avloniy_muzeyi
      POSTGRES_USER: avloniy
      POSTGRES_PASSWORD: avloniy123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: